# Netlify — front React e-depot (monorepo npm workspaces).
# Connecter le repo sur Netlify ; définir la variable d'env VITE_API_URL
# (URL publique de l'API Render, ex. https://e-depot-api.onrender.com) dans
# Site settings → Environment variables, PUIS déclencher un deploy.
[build]
  base = "apps/web"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Le front est buildé avec base=/e-depot/ (servi sous ce sous-chemin, y compris
# derrière le proxy IIS ci-apps.medlog.com/e-depot). On mappe donc /e-depot/* :

# 1) les assets hashés → fichiers réels à la racine du publish
[[redirects]]
  from = "/e-depot/assets/*"
  to = "/assets/:splat"
  status = 200

# 1bis) fichiers statiques du dossier public (logo, photos hero…) servis sous /e-depot
[[redirects]]
  from = "/e-depot/medlog-logo.png"
  to = "/medlog-logo.png"
  status = 200
[[redirects]]
  from = "/e-depot/hero-port.jpg"
  to = "/hero-port.jpg"
  status = 200
[[redirects]]
  from = "/e-depot/hero-yard.jpg"
  to = "/hero-yard.jpg"
  status = 200

# 2) SPA : toute autre route sous /e-depot sert index.html (React Router, basename /e-depot)
[[redirects]]
  from = "/e-depot/*"
  to = "/index.html"
  status = 200

# 3) confort : la racine redirige vers /e-depot/ (force = passe avant le fichier statique)
[[redirects]]
  from = "/"
  to = "/e-depot/"
  status = 301
  force = true
